name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: backend/go.sum

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm run test:run

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Download Go dependencies
        working-directory: backend
        run: go mod download

      - name: Run backend tests
        working-directory: backend
        run: go test ./...

      - name: Build release package
        env:
          VERSION: ${{ github.ref_name }}
        run: bash build-release.sh "$VERSION"

      - name: Package release artifacts
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          cd release
          tar -czf "game-release-${VERSION}-linux-amd64.tar.gz" "game-release-${VERSION}"
          zip -r "game-release-${VERSION}-linux-amd64.zip" "game-release-${VERSION}"
          sha256sum "game-release-${VERSION}-linux-amd64.tar.gz" "game-release-${VERSION}-linux-amd64.zip" > "game-release-${VERSION}-checksums.txt"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/game-release-${{ github.ref_name }}-linux-amd64.tar.gz
            release/game-release-${{ github.ref_name }}-linux-amd64.zip
            release/game-release-${{ github.ref_name }}-checksums.txt
